# Coturn TURN Server Configuration
# For JellySync WebRTC voice chat

# Network
listening-port=3478
tls-listening-port=5349

# Use fingerprint in TURN message
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm (set to your domain)
realm=jellysync.local

# Authentication — set credentials via TURN_USERNAME and TURN_PASSWORD env vars
# in docker-compose.yml. Do NOT hardcode credentials here.

# Logging
log-file=stdout
verbose

# Relay configuration
# Min/max relay ports
min-port=49152
max-port=65535

# Disable TCP relay (UDP only for voice)
no-tcp-relay

# Deny relay to private IPs (security)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Allow localhost for development
allowed-peer-ip=127.0.0.1

# Max allocations per user
total-quota=100
user-quota=10

# Stale nonce lifetime (seconds)
stale-nonce=600

# No multicast peers
no-multicast-peers
