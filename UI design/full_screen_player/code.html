<div class="fixed inset-0 z-0 bg-surface-container-lowest flex items-center justify-center overflow-hidden">

<!-- Top Controls: TopAppBar (Modified for Player Context) -->
<header class="flex items-center justify-between px-6 py-6 md:px-12 w-full bg-surface/10 backdrop-blur-md">
<div class="flex items-center gap-6">
<button class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-white/10 transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline font-extrabold tracking-tight text-xl md:text-2xl text-on-surface">Neon Horizon: 2049</h1>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary font-semibold">Watching in 4K • Dolby Atmos</span>
</div>
</div>
<div class="flex items-center gap-2 md:gap-4">
<button class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-on-surface" data-icon="closed_caption">closed_caption</span>
</button>
<button class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-on-surface" data-icon="volume_up">volume_up</span>
</button>
<button class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-on-surface" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<!-- Center Controls: Playback Console -->
<main class="flex-grow flex items-center justify-center px-6">
<div class="flex items-center gap-8 md:gap-16">
<!-- Skip Back -->
<button class="group flex flex-col items-center gap-2 text-on-surface/60 hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined text-4xl md:text-5xl" data-icon="replay_10">replay_10</span>
</button>
<!-- Primary Play/Pause: The Jewel Component -->
<div class="relative">
<div class="absolute -inset-8 bg-primary/10 blur-3xl rounded-full opacity-50"></div>
<button class="relative w-24 h-24 md:w-32 md:h-32 flex items-center justify-center rounded-full bg-surface-container-highest/40 backdrop-blur-2xl border border-white/5 shadow-[0_20px_40px_rgba(0,0,0,0.5)] active:scale-95 transition-transform group">
<span class="material-symbols-outlined text-5xl md:text-6xl text-primary" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
</div>
<!-- Skip Forward -->
<button class="group flex flex-col items-center gap-2 text-on-surface/60 hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined text-4xl md:text-5xl" data-icon="forward_10">forward_10</span>
</button>
</div>
</main>
<!-- Bottom Controls: Timeline & Meta -->
<footer class="w-full px-6 py-12 md:px-12 flex flex-col gap-6">
<!-- Floating Mic / Mute Indicator (Bottom Right Anchor) -->
<div class="absolute bottom-32 right-6 md:right-12 z-20">
<button class="flex items-center gap-3 px-6 py-4 bg-surface-container-high/40 backdrop-blur-xl rounded-full border border-white/5 opacity-60 hover:opacity-100 transition-all active:scale-95">
<div class="w-2 h-2 rounded-full bg-error shadow-[0_0_10px_#ffb4ab]"></div>
<span class="material-symbols-outlined text-error" data-icon="mic_off" style="font-variation-settings: 'FILL' 1;">mic_off</span>
<span class="text-on-surface font-label text-xs font-semibold tracking-wider">MIC MUTED</span>
</button>
</div>
<!-- Playback Progress -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end mb-1">
<span class="font-label text-xs font-medium text-on-surface-variant tabular-nums">01:14:22</span>
<span class="font-label text-xs font-medium text-on-surface-variant tabular-nums">- 45:12</span>
</div>
<!-- Seek Bar -->
<div class="relative w-full h-1.5 bg-white/10 rounded-full cursor-pointer group">
<!-- Progress Fill -->
<div class="absolute left-0 top-0 h-full w-[62%] bg-gradient-to-r from-primary/80 to-primary rounded-full relative">
<!-- Playhead (The Hub) -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-on-surface rounded-full shadow-[0_0_15px_rgba(110,233,224,0.6)] scale-0 group-hover:scale-100 transition-transform border-4 border-primary"></div>
</div>
<!-- Buffer Line -->
<div class="absolute left-[62%] top-0 h-full w-[15%] bg-white/20 rounded-r-full"></div>
</div>
</div>

<div class="w-10 h-10 rounded-full bg-surface-container-high border-2 border-surface flex items-center justify-center">
<span class="text-[10px] font-bold text-primary">+2</span>
</div>
</div>
<div class="h-4 w-[1px] bg-white/10 mx-2"></div>
<div class="flex gap-3">
