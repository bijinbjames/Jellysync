<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JellySync - Connect to your World</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#93000a",
              "inverse-on-surface": "#313030",
              "surface-container-low": "#1c1b1b",
              "tertiary": "#ffcbac",
              "primary-fixed": "#7cf6ec",
              "on-tertiary": "#512400",
              "secondary-fixed-dim": "#c8bfff",
              "inverse-primary": "#006a65",
              "secondary": "#c8bfff",
              "on-primary": "#003734",
              "on-primary-fixed-variant": "#00504c",
              "on-error-container": "#ffdad6",
              "surface-container": "#201f1f",
              "primary-container": "#4ecdc4",
              "surface": "#131313",
              "surface-container-high": "#2a2a2a",
              "on-tertiary-fixed-variant": "#733600",
              "surface-variant": "#353534",
              "on-surface-variant": "#bcc9c7",
              "secondary-fixed": "#e5deff",
              "error": "#ffb4ab",
              "outline": "#869391",
              "outline-variant": "#3d4948",
              "on-secondary-fixed": "#190064",
              "on-tertiary-fixed": "#311300",
              "on-secondary-container": "#b6abff",
              "on-secondary-fixed-variant": "#442bb5",
              "secondary-container": "#442bb5",
              "surface-container-lowest": "#0e0e0e",
              "on-tertiary-container": "#783901",
              "primary-fixed-dim": "#5dd9d0",
              "on-secondary": "#2d009d",
              "on-surface": "#e5e2e1",
              "tertiary-container": "#ffa568",
              "on-error": "#690005",
              "surface-dim": "#131313",
              "tertiary-fixed-dim": "#ffb688",
              "on-primary-container": "#00544f",
              "surface-container-highest": "#353534",
              "surface-bright": "#3a3939",
              "background": "#131313",
              "on-primary-fixed": "#00201e",
              "surface-tint": "#5dd9d0",
              "inverse-surface": "#e5e2e1",
              "on-background": "#e5e2e1",
              "primary": "#6ee9e0",
              "tertiary-fixed": "#ffdbc7"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .bg-mesh {
            background-color: #0e0e0e;
            background-image: 
                radial-gradient(at 0% 0%, rgba(110, 233, 224, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(68, 43, 181, 0.2) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-mesh font-body text-on-surface min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center mb-4">
<div class="bg-gradient-to-br from-primary to-primary-container p-3 rounded-md shadow-[0_0_20px_rgba(110,233,224,0.3)] scale-110 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tighter text-primary mb-2">JellySync</h1>
<p class="font-label text-secondary uppercase tracking-[0.2em] text-xs font-medium">Watch together.</p>
</div>
<!-- Connection Card -->
<div class="glass-panel w-full rounded-lg p-8 shadow-[0_20px_40px_rgba(0,0,0,0.4)] border border-white/5 relative overflow-hidden">
<!-- Subtle Rim Light -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Connect Server</h2>
<p class="text-on-surface-variant text-sm mt-1">Enter your Jellyfin details to start syncing.</p>
</header>
<form class="space-y-5">
<!-- Server URL Input -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-secondary ml-1 tracking-wider uppercase">Server URL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">dns</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/30 transition-all outline-none" placeholder="https://jellyfin.example.com" type="url"/>
</div>
</div>
<!-- Username Input -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-secondary ml-1 tracking-wider uppercase">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/30 transition-all outline-none" placeholder="Your username" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5 pb-2">
<label class="block text-xs font-semibold text-secondary ml-1 tracking-wider uppercase">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Connect Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container py-4 rounded-md font-headline font-bold text-on-primary-container text-lg shadow-[0_4px_24px_rgba(110,233,224,0.25)] hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Connect</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
</form>
</div>
<!-- Footer Link -->
<footer class="mt-8 text-center">
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-sm font-medium" href="#">
                Learn more about Jellyfin
                <span class="material-symbols-outlined text-lg">open_in_new</span>
</a>
</footer>
</main>
<!-- Visual Polish: Background Orbs (Decorative) -->
<div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary-container/20 rounded-full blur-[140px] -z-10"></div>
</body></html>
