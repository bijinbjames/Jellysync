<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",

          extend: {

              "secondary-fixed-dim": "#c8bfff",
              "inverse-primary": "#006a65",
              "secondary": "#c8bfff",
              "on-primary": "#003734",
              "on-primary-fixed-variant": "#00504c",
              "on-error-container": "#ffdad6",
              "surface-container": "#201f1f",
              "primary-container": "#4ecdc4",
              "surface": "#131313",
              "surface-container-high": "#2a2a2a",
              "on-tertiary-fixed-variant": "#733600",
              "surface-variant": "#353534",
              "on-surface-variant": "#bcc9c7",
              "secondary-fixed": "#e5deff",
              "error": "#ffb4ab",
              "outline": "#869391",
              "outline-variant": "#3d4948",
              "on-secondary-fixed": "#190064",
              "on-tertiary-fixed": "#311300",
              "on-secondary-container": "#b6abff",
              "on-secondary-fixed-variant": "#442bb5",
              "secondary-container": "#442bb5",
              "surface-container-lowest": "#0e0e0e",
              "on-tertiary-container": "#783901",
              "primary-fixed-dim": "#5dd9d0",
              "on-secondary": "#2d009d",
              "on-surface": "#e5e2e1",
              "tertiary-container": "#ffa568",
              "on-error": "#690005",
              "surface-dim": "#131313",
              "tertiary-fixed-dim": "#ffb688",
              "on-primary-container": "#00544f",
              "surface-container-highest": "#353534",
              "surface-bright": "#3a3939",
              "background": "#131313",
              "on-primary-fixed": "#00201e",
              "surface-tint": "#5dd9d0",
              "inverse-surface": "#e5e2e1",
              "on-background": "#e5e2e1",
              "primary": "#6ee9e0",
              "tertiary-fixed": "#ffdbc7"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]

            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .glow-shadow {
        box-shadow: 0 0 40px rgba(110, 233, 224, 0.1);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-surface/60 dark:bg-neutral-900/60 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex flex-col">
<h1 class="font-headline font-bold tracking-tight text-[#e5e2e1] text-xl">Hey, Bijin</h1>
<p class="text-[10px] font-medium uppercase tracking-widest text-secondary/70">Connected to media.bijin.dev</p>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-white/5 transition-colors p-2 rounded-full scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Canvas Content -->
<main class="flex-grow flex flex-col justify-center px-6 pt-24 pb-12 gap-8 max-w-2xl mx-auto w-full">
<!-- Welcome Section -->
<section class="mb-4">
<h2 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface leading-tight">
                Ready for a <br/>
<span class="text-primary">Private Screening?</span>
</h2>
</section>
<!-- Action Cards Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- Create Room Card -->
<button class="group relative overflow-hidden bg-gradient-to-br from-primary to-on-primary-fixed-variant rounded-lg p-8 flex flex-col items-start text-left w-full h-64 scale-98 active:scale-95 transition-transform duration-200 glow-shadow">
<div class="absolute top-0 right-0 p-8 opacity-20 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[120px]" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<div class="mt-auto relative z-10">
<div class="mb-4 bg-on-primary/20 backdrop-blur-md p-3 rounded-md inline-flex">
<span class="material-symbols-outlined text-on-primary" data-icon="movie">movie</span>
</div>
<h3 class="font-headline text-2xl font-extrabold text-on-primary mb-1">Create Room</h3>
<p class="text-on-primary/80 font-medium text-sm">Pick a movie and invite others</p>
</div>
</button>
<!-- Join Room Card -->
<button class="group relative overflow-hidden bg-surface-container-high rounded-lg p-8 flex flex-col items-start text-left w-full h-64 scale-98 active:scale-95 transition-transform duration-200 outline-variant/15 outline outline-1 hover:bg-surface-container-highest transition-colors">
<div class="absolute top-0 right-0 p-8 opacity-10 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[120px]" data-icon="door_open">door_open</span>
</div>
<div class="mt-auto relative z-10">
<div class="mb-4 bg-secondary/10 backdrop-blur-md p-3 rounded-md inline-flex">
<span class="material-symbols-outlined text-secondary" data-icon="meeting_room">meeting_room</span>
</div>
<h3 class="font-headline text-2xl font-extrabold text-on-surface mb-1">Join Room</h3>
<p class="text-on-surface-variant font-medium text-sm">Enter a code or tap a link</p>
</div>
</button>
</div>
<!-- Footer Contextual Hint -->
<p class="text-center text-xs font-label text-on-surface/30 tracking-widest uppercase mt-4">
            Synced via JellySync Core v2.4.0
        </p>
</main>
<!-- Bottom Shell Suppressed for Focus Screen -->
<!-- Logic: Suppressed because page intent is Task-Focused/Linear -->
</body></html>
