<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JellySync - Room Lobby</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#93000a",
              "inverse-on-surface": "#313030",
              "surface-container-low": "#1c1b1b",
              "tertiary": "#ffcbac",
              "primary-fixed": "#7cf6ec",
              "on-tertiary": "#512400",
              "secondary-fixed-dim": "#c8bfff",
              "inverse-primary": "#006a65",
              "secondary": "#c8bfff",
              "on-primary": "#003734",
              "on-primary-fixed-variant": "#00504c",
              "on-error-container": "#ffdad6",
              "surface-container": "#201f1f",
              "primary-container": "#4ecdc4",
              "surface": "#131313",
              "surface-container-high": "#2a2a2a",
              "on-tertiary-fixed-variant": "#733600",
              "surface-variant": "#353534",
              "on-surface-variant": "#bcc9c7",
              "secondary-fixed": "#e5deff",
              "error": "#ffb4ab",
              "outline": "#869391",
              "outline-variant": "#3d4948",
              "on-secondary-fixed": "#190064",
              "on-tertiary-fixed": "#311300",
              "on-secondary-container": "#b6abff",
              "on-secondary-fixed-variant": "#442bb5",
              "secondary-container": "#442bb5",
              "surface-container-lowest": "#0e0e0e",
              "on-tertiary-container": "#783901",
              "primary-fixed-dim": "#5dd9d0",
              "on-secondary": "#2d009d",
              "on-surface": "#e5e2e1",
              "tertiary-container": "#ffa568",
              "on-error": "#690005",
              "surface-dim": "#131313",
              "tertiary-fixed-dim": "#ffb688",
              "on-primary-container": "#00544f",
              "surface-container-highest": "#353534",
              "surface-bright": "#3a3939",
              "background": "#131313",
              "on-primary-fixed": "#00201e",
              "surface-tint": "#5dd9d0",
              "inverse-surface": "#e5e2e1",
              "on-background": "#e5e2e1",
              "primary": "#6ee9e0",
              "tertiary-fixed": "#ffdbc7"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-mesh {
        background: radial-gradient(circle at 0% 0%, rgba(110, 233, 224, 0.08) 0%, transparent 50%),
                    radial-gradient(circle at 100% 100%, rgba(200, 191, 255, 0.05) 0%, transparent 50%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/60 dark:bg-neutral-900/60 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full no-line tonal-shift bg-neutral-900/60 shadow-none">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#e5e2e1]/70 hover:bg-white/5 transition-colors p-2 rounded-full scale-95 active:scale-90 transition-transform duration-200" data-icon="menu">menu</button>
<span class="text-2xl font-extrabold tracking-tighter text-[#6ee9e0] font-manrope">JellySync</span>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-[#e5e2e1]/70 hover:bg-white/5 transition-colors p-2 rounded-full scale-95 active:scale-90 transition-transform duration-200" data-icon="account_circle">account_circle</button>
</div>
</header>
<main class="flex-1 mt-20 px-6 pb-32 max-w-2xl mx-auto w-full bg-mesh">
<!-- Movie Brief -->
<section class="flex items-center gap-5 p-4 rounded-lg bg-surface-container-low mb-12">
<div class="w-16 h-24 rounded-md overflow-hidden flex-shrink-0 shadow-lg border border-white/5">
<img alt="Movie Poster" class="w-full h-full object-cover" data-alt="Small cyberpunk movie poster thumbnail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAnbQm4_-syIJzUvRnYagfxa65Po_zZHxDkrkl3BSB_qjkaEI9sdOpDu9IZB252NAOgh2JobY2JZu6wCEz-EYirmGLTjFmszpJ60QN3Q4971s1FGuRWxSuY2BK6MA0etDYYCsRMEi0qUpH8CGA7sklQusk1-h77OSEJhN1W1TZkFf0mpbvf8_DOB2-xxpdDXsA6qWW8O5mWouz2W8DCwtj9d_gCQADfHe1AtbfZ9XlpmK9v_ooTkhodcklstd79ZCF3E0SE66jtFUpw"/>
</div>
<div>
<h2 class="font-headline text-xl font-bold tracking-tight text-on-surface">Interstellar</h2>
<p class="text-secondary font-label text-sm uppercase tracking-widest mt-1">2014 • 2h 49m</p>
</div>
</section>
<!-- Room Code Hero -->
<section class="text-center mb-16 flex flex-col items-center">
<h3 class="font-label text-sm uppercase tracking-[0.2em] text-on-surface-variant mb-4">Your Room Code</h3>
<div class="bg-surface-container-high/40 backdrop-blur-md px-10 py-8 rounded-lg border border-white/5 shadow-2xl relative group">
<span class="font-headline text-6xl md:text-7xl font-extrabold tracking-[0.2em] text-primary font-mono block">JLY-8X</span>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-primary rounded-full animate-pulse shadow-[0_0_10px_rgba(110,233,224,0.8)]"></div>
</div>
<div class="mt-8 flex flex-col sm:flex-row items-center gap-6">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-container px-8 py-4 rounded-md font-bold flex items-center gap-3 shadow-lg scale-98 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="share">share</span>
                    Share Link
                </button>
<button class="text-primary font-bold hover:underline underline-offset-8 decoration-2 flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm" data-icon="content_copy">content_copy</span>
                    Copy Code
                </button>
</div>
</section>
<!-- Participants List -->
<section class="mb-12">
<div class="flex items-center justify-between mb-6">
<h4 class="font-headline text-lg font-semibold text-on-surface">Participants</h4>
<div class="flex items-center gap-2 px-3 py-1 bg-secondary/10 rounded-full">
<span class="w-2 h-2 bg-secondary rounded-full animate-pulse"></span>
<span class="text-xs font-label uppercase text-secondary tracking-widest">Waiting for others...</span>
</div>
</div>
<div class="flex flex-wrap gap-4">
<!-- Host (Active) -->
<div class="flex items-center gap-3 bg-surface-container-high px-4 py-3 rounded-md border border-white/5">
<div class="w-8 h-8 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary text-lg" data-icon="person">person</span>
</div>
<span class="font-medium text-sm">Alex (Host)</span>
<span class="material-symbols-outlined text-primary text-sm ml-2" data-icon="mic">mic</span>
</div>
<!-- Empty State Slots -->
<div class="flex items-center gap-3 bg-surface-container-low border border-dashed border-outline-variant/30 px-4 py-3 rounded-md opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-xs" data-icon="add">add</span>
</div>
<span class="text-sm italic">Slot available</span>
</div>
<div class="flex items-center gap-3 bg-surface-container-low border border-dashed border-outline-variant/30 px-4 py-3 rounded-md opacity-30">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-xs" data-icon="add">add</span>
</div>
<span class="text-sm italic">Slot available</span>
</div>
</div>
</section>
<!-- Primary Action -->
<section class="flex flex-col items-center gap-8">
<button class="w-full py-5 rounded-md font-headline text-lg font-bold bg-surface-container-highest text-on-surface-variant cursor-not-allowed transition-all shadow-inner border border-white/5" disabled="">
                Start Movie
            </button>
<div class="flex justify-end w-full">
<button class="text-error/70 hover:text-error font-medium text-sm transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
                    Cancel Room
                </button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[2rem] bg-surface/60 dark:bg-neutral-900/60 backdrop-blur-xl shadow-[0_-10px_40px_rgba(0,0,0,0.4)] md:hidden no-line tonal-shift">
<div class="flex justify-around items-center w-full px-4 pb-8 pt-4">
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/50 px-4 py-2 hover:text-[#6ee9e0] transition-all scale-98 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Discover</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#4ecdc4]/20 text-[#6ee9e0] rounded-2xl px-6 py-2 hover:text-[#6ee9e0] transition-all scale-98 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="group">group</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Rooms</span>
</a>
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/50 px-4 py-2 hover:text-[#6ee9e0] transition-all scale-98 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="subscriptions">subscriptions</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Watchlist</span>
</a>
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/50 px-4 py-2 hover:text-[#6ee9e0] transition-all scale-98 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Settings</span>
</a>
</div>
</nav>
</body></html>
